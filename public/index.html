<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusChat — Colaboración en Tiempo Real</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- La app se muestra directamente: el servidor ya validó la sesión de Google -->
  <div id="app" class="app hidden">

    <!-- ─ SIDEBAR ─ -->
    <aside class="sidebar">

      <!-- Marca -->
      <div class="sidebar-brand">
        <div class="logo-mark sm">NC</div>
        <span class="brand-name">NexusChat</span>
        <div id="wsStatus" class="ws-pill connected">
          <span class="ws-dot"></span> WS
        </div>
      </div>

      <!-- Salas -->
      <div class="sidebar-section">
        <div class="section-title">Salas</div>
        <ul id="roomList" class="nav-list">
          <li class="nav-item active" data-room="general">
            <span class="hash">#</span> general
          </li>
          <li class="nav-item" data-room="tech">
            <span class="hash">#</span> tech
          </li>
          <li class="nav-item" data-room="random">
            <span class="hash">#</span> random
          </li>
        </ul>
      </div>

      <!-- Usuarios en línea -->
      <div class="sidebar-section">
        <div class="section-title">
          En línea
          <span id="onlineCount" class="count-badge">0</span>
        </div>
        <ul id="userList" class="nav-list users-list"></ul>
      </div>

      <!-- Perfil: foto de Google + nombre + logout -->
      <div class="sidebar-profile">
        <div id="ownAvatar" class="avatar"></div>
        <div class="profile-meta">
          <span id="ownUsername" class="profile-name">—</span>
          <span class="profile-online">● En línea</span>
        </div>
        <!-- Botón cerrar sesión -->
        <button id="logoutBtn" class="icon-btn" title="Cerrar sesión">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- ─ ÁREA PRINCIPAL ─ -->
    <main class="chat-main">

      <!-- Header del canal -->
      <header class="chat-header">
        <div class="header-left">
          <span class="hash lg">#</span>
          <h1 id="roomTitle">general</h1>
          <span id="memberCount" class="member-count">0 miembros</span>
        </div>
        <div class="header-right">
          <div class="tech-badge">WebSocket · Node.js · Google OAuth</div>
        </div>
      </header>

      <!-- Mensajes -->
      <div id="messagesContainer" class="messages-container">
        <div id="messagesInner" class="messages-inner"></div>
        <div id="typingIndicator" class="typing-indicator hidden"></div>
      </div>

      <!-- Input -->
      <div class="input-bar">
        <div class="input-wrap">
          <div
            id="msgInput"
            class="msg-input"
            contenteditable="true"
            data-placeholder="Mensaje en #general…"
            role="textbox"
            aria-label="Escribe un mensaje"
          ></div>
          <button id="sendBtn" class="send-btn" title="Enviar (Enter)">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="input-hint"><kbd>Enter</kbd> enviar · <kbd>Shift+Enter</kbd> nueva línea</p>
      </div>
    </main>
  </div>

  <script src="js/chat.js"></script>
</body>
</html>
